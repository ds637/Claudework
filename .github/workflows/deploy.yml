name: Deploy to GitHub Pages

on:
  push:
    branches:
      - claude/smsf-property-modeller-X65va

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: smsf-modeller/package-lock.json

      - name: Install dependencies
        working-directory: smsf-modeller
        run: npm ci

      - name: Build
        working-directory: smsf-modeller
        run: |
          export PUBLIC_URL=/Claudework
          export CI=false
          npm run build

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: smsf-modeller/build

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
